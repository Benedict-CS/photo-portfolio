# Production compose file for the photo portfolio.
#
# Volumes are bind-mounts to the host's checkout so the same data (DB,
# thumbs, backups) survives container rebuilds AND remains directly
# editable from the shell on the host (e.g. `sqlite3 .astro/content.db`).
#
# First-time install:
#   docker compose up -d --build
#
# Update (after `git pull`):
#   docker compose up -d --build
#
# Backups:
#   docker compose exec app npm run backup     # one-off
#   (or use the systemd timer that calls this — see deploy/README.md)

services:
  app:
    build:
      context: .
      args:
        # SITE_URL bakes into Astro config (canonical, og:url, sitemap).
        # Override via `SITE_URL=https://... docker compose up -d --build`.
        SITE_URL: ${SITE_URL:-http://localhost:4321}
    image: photo-portfolio:latest
    container_name: photo-portfolio
    restart: unless-stopped
    # Run as the host user that owns the bind-mounted .astro/ + public/thumbs
    # directories so SQLite can actually WRITE the DB. The image bakes an
    # `app` user (UID 1001) for security, but the host bind-mount belongs
    # to the human user (usually UID 1000 on Ubuntu).
    # Override via PUID/PGID in .env if your shell user is something other
    # than 1000:1000:   echo "PUID=$(id -u)" >> .env && echo "PGID=$(id -g)" >> .env
    user: "${PUID:-1000}:${PGID:-1000}"
    ports:
      - "4321:4321"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "4321"
    volumes:
      # SQLite DB — must persist across rebuilds.
      - ./.astro:/app/.astro
      # Generated thumbnails — regenerable, but cheap to keep so the
      # first request after a rebuild doesn't re-fetch from Nextcloud.
      # In a built SSR app, Astro serves static assets from dist/client/
      # so that's where thumbs must land at runtime.
      - ./public/thumbs:/app/dist/client/thumbs
      # Backup zips land here.
      - ./backups:/app/backups
    healthcheck:
      # Use Node's built-in fetch (Node 22+) instead of busybox wget —
      # alpine's wget has quirks with -O- that flag the container unhealthy
      # even when /health returns 200. Node is guaranteed to be in the image.
      test: ["CMD", "node", "-e", "fetch('http://localhost:4321/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    # Cap container log on disk — without this, a chatty error loop can
    # silently fill /var/lib/docker. 3 × 10 MB = at most 30 MB per service.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
